name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.version }}"
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          LDFLAGS="-s -w -X 'asika/common/version.Version=${TAG}' -X 'asika/common/version.Enabled=true'"

          mkdir -p bin

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="${LDFLAGS}" -o "bin/asikad-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/asikad/main.go

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="${LDFLAGS}" -o "bin/asika-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/asika/main.go

      - name: Package tarballs and generate checksums
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.version }}"
          mkdir -p dist
          PKG="asika-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${PKG}"
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          cp "bin/asikad-${{ matrix.goos }}-${{ matrix.goarch }}$EXT" "dist/${PKG}/asikad${EXT}"
          cp "bin/asika-${{ matrix.goos }}-${{ matrix.goarch }}$EXT" "dist/${PKG}/asika${EXT}"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp pack/templates/service/asikad.service "dist/${PKG}/"
            cp pack/templates/service/asikad.openrc "dist/${PKG}/"
          fi
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            cp pack/templates/service/com.asika.daemon.plist "dist/${PKG}/"
          fi
          cp pack/doc/asika.1 "dist/${PKG}/"
          cp pack/doc/asikad.1 "dist/${PKG}/"
          cp pack/doc/asika.html "dist/${PKG}/"
          cp pack/doc/asikad.html "dist/${PKG}/"
          tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
          sha256sum "bin/asikad-${{ matrix.goos }}-${{ matrix.goarch }}$EXT" > "dist/asikad-${{ matrix.goos }}-${{ matrix.goarch }}.sha256sum"

      - uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256sum

  package-deb:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: binaries-linux-${{ matrix.goarch }}
          path: bin/
          merge-multiple: true

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        run: |
          cd bin
          tar -xzf asika-linux-${{ matrix.goarch }}.tar.gz
          cp asika-linux-${{ matrix.goarch }}/asika .. || true
          cp asika-linux-${{ matrix.goarch }}/asikad .. || true
          cd ..

      - name: Package DEB
        run: bash pack/scripts/package-deb.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v6
        with:
          name: deb-packages
          path: dist/*.deb

  package-pkg:
    needs: build
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: binaries-darwin-${{ matrix.goarch }}
          path: bin/
          merge-multiple: true

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        run: |
          cd bin
          tar -xzf asika-darwin-${{ matrix.goarch }}.tar.gz
          cp asika-darwin-${{ matrix.goarch }}/asikad asikad-darwin-${{ matrix.goarch }}
          cd ..

      - name: Package PKG
        run: bash pack/scripts/package-pkg.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v6
        with:
          name: pkg-packages
          path: dist/*.pkg

  package-inno:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: binaries-windows-amd64
          path: bin/
          merge-multiple: true

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        shell: bash
        run: |
          cd bin
          tar -xzf asika-windows-amd64.tar.gz
          cp asika-windows-amd64/asika.exe .. || true
          cp asika-windows-amd64/asikad.exe .. || true
          cd ..

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress --limit-output
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

      - name: Package Inno Setup
        shell: bash
        run: bash pack/scripts/package-inno.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Move Inno output to dist/
        shell: bash
        run: |
          mkdir -p dist
          mv inno-build/Output/*-setup.exe dist/ 2>/dev/null || \
          mv inno-build/Output/*.exe dist/asika-${{ github.ref_name }}-setup.exe 2>/dev/null || true
          ls -la dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: inno-packages
          path: dist/*-setup.exe

  package-docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: binaries-linux-amd64
          path: bin/
          merge-multiple: true

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        run: |
          cd bin
          tar -xzf asika-linux-amd64.tar.gz
          cp asika-linux-amd64/asika .. || true
          cp asika-linux-amd64/asikad .. || true
          cd ..

      - name: Package Docker
        run: bash pack/scripts/package-docker.sh
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_IMAGE_NAME: asikaproject/asika

  release:
    needs: [build, package-deb, package-pkg, package-inno, package-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: binaries-*
          path: binaries/
          merge-multiple: true

      - uses: actions/download-artifact@v7
        with:
          pattern: '*-packages'
          path: packages/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp binaries/*.tar.gz release-assets/
          cp binaries/*.sha256sum release-assets/
          cp packages/deb-packages/* release-assets/ 2>/dev/null || true
          cp packages/pkg-packages/* release-assets/ 2>/dev/null || true
          cp packages/inno-packages/* release-assets/ 2>/dev/null || true
          ls -lh release-assets/
          wget https://github.com/AsikaProject/asika/raw/main/ChangeLog.md -O release-assets/ChangeLog.md

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
