<!DOCTYPE html>
<html lang="{{currentLang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "pwa"}}
    {{template "styles"}}
    <title>PR #{{.pr_id}} - Asika</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<div id="prDetail">{{t "common.loading"}}</div>
<div style="margin: 20px 0;" id="actions"></div>
<div id="closeReasonModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:#fff;padding:24px;border-radius:8px;max-width:400px;width:90%;box-shadow:0 4px 16px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0;">{{t "pr_detail.close"}}</h3>
        <div id="closeReasonButtons" style="margin-bottom:12px;"></div>
        <div style="margin-bottom:12px;">
            <input type="text" id="customCloseReason" placeholder="Custom reason..." style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
        </div>
        <div style="text-align:right;">
            <button class="btn btn-secondary" onclick="document.getElementById('closeReasonModal').style.display='none'" style="margin-right:8px;">Cancel</button>
            <button class="btn btn-danger" id="confirmCloseBtn">Close</button>
        </div>
    </div>
</div>
<div class="card" style="margin-top: 20px;">
    <h2>{{t "pr_detail.events"}}</h2>
    <div id="eventList">{{t "common.loading"}}</div>
</div>
</div>
{{template "scripts"}}
<script>
    var repoGroup='{{.repo_group}}',prId='{{.pr_id}}';
    var closeReasons = [];
    async function fetchCloseReasons(){
        try{
            var r = await apiRequest('/api/v1/config');
            if(r.ok){
                var cfg = await r.json();
                if(cfg.close_reasons && cfg.close_reasons.reasons){
                    closeReasons = cfg.close_reasons.reasons;
                }
            }
        }catch(e){}
    }
    fetchCloseReasons();
    async function L(){
         try {
             var r = await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId);
             if(!r.ok){ D('err:load'); return; }
             var p = await r.json();

             // Load audit log events for this PR
             try {
                 var prNum = parseInt(prId, 10);
                 if (!isNaN(prNum)) {
                     var logR = await apiRequest('/api/v1/logs?repo_group='+encodeURIComponent(repoGroup)+'&pr_number='+prNum+'&limit=50');
                     if (logR.ok) {
                         var auditLogs = await logR.json();
                         if (auditLogs && auditLogs.length > 0) {
                             var auditEvents = auditLogs.map(function(l) {
                                 return { action: l.action || l.category || 'event', actor: l.actor || 'system', timestamp: l.timestamp, detail: l.message || '', source: 'audit' };
                             });
                             p.events = (p.events || []).concat(auditEvents);
                         }
                     }
                 }
             } catch(e) {
                 console.error('Failed to load audit logs:', e);
             }

            var platformLink = p.html_url
                ? '<a href="'+escapeHtml(p.html_url)+'" target="_blank" style="color: #0066cc;">'+escapeHtml(p.platform)+' ↗</a>'
                : escapeHtml(p.platform);

            var descHtml = '';
            if (p.body) {
                var bodyLines = p.body.split('\n').slice(0, 10);
                descHtml = '<div style="margin:12px 0;padding:12px;background:#f8f9fa;border-radius:4px;white-space:pre-wrap;font-size:13px;max-height:200px;overflow:auto;">' + escapeHtml(bodyLines.join('\n')) + (p.body.split('\n').length > 10 ? '\n...' : '') + '</div>';
            }
            var lastCommitHtml = '';
            if (p.merge_commit_sha) {
                lastCommitHtml = '<p><strong>{{t "pr_detail.author"}} </strong> '+escapeHtml(p.author)+'</p>' +
                    '<p><strong>Last commit:</strong> <code style="font-size:12px;">'+escapeHtml(p.merge_commit_sha.substring(0,8))+'</code></p>';
            }
            document.getElementById('prDetail').innerHTML =
                '<h1>'+escapeHtml(p.title)+' <span style="font-size:14px;color:#666;">#'+p.pr_number+'</span></h1>' +
                '<p><strong>{{t "pr_detail.author"}} </strong> '+escapeHtml(p.author)+'</p>' +
                '<p><strong>{{t "pr_detail.state"}} </strong> <span class="status-'+escapeHtml(p.state)+'">'+escapeHtml(p.state)+'</span></p>' +
                '<p><strong>{{t "pr_detail.platform"}} </strong> '+platformLink+'</p>' +
                '<p><strong>{{t "pr_detail.labels"}} </strong> '+(p.labels||[]).map(function(l){return'<span class="label">'+escapeHtml(l)+'</span>'}).join('')+'</p>' +
                descHtml + lastCommitHtml;

            var a = '';
            if(p.state === 'open'){
                if(!p.is_approved){
                    a += '<button class="btn btn-success" onclick="A()">{{t "pr_detail.approve"}}</button> ';
                } else {
                    a += '<span style="color: #28a745; font-weight: 600; padding: 8px 14px; display: inline-block;">✓ {{t "pr_list.approved"}}</span> ';
                }
                a += '<button class="btn btn-danger" onclick="C()">{{t "pr_detail.close"}}</button> ';
                a += '<button class="btn" onclick="S()" style="background:#ffc107;color:black;">{{t "pr_detail.mark_spam"}}</button> ';
                a += '<button class="btn btn-secondary" onclick="RB()">Rebase</button> ';
            } else if(p.state === 'merged'){
                a += '<button class="btn btn-warning" onclick="RV()">{{t "pr_detail.revert"}}</button> ';
            } else {
                a += '<button class="btn btn-secondary" onclick="R()">{{t "pr_detail.reopen"}}</button> ';
            }
            a += '<button class="btn btn-secondary" onclick="CMT()">💬 Comment</button> ';
            if(p.state === 'merged'){
                a += '<button class="btn btn-secondary" onclick="CP()">🍒 Cherry-pick</button> ';
            }
            document.getElementById('actions').innerHTML = a;

            var allEvents = [];
            if (p.events && p.events.length > 0) {
                allEvents = p.events.map(function(e) {
                    return { action: e.action, actor: e.actor, timestamp: e.timestamp, detail: e.detail || '', source: 'pr' };
                });
            }
            allEvents.sort(function(a, b) { return new Date(a.timestamp) - new Date(b.timestamp); });
            if (allEvents.length > 0) {
                document.getElementById('eventList').innerHTML = allEvents.map(function(e) {
                    var color = e.source === 'audit' ? '#28a745' : '#0066cc';
                    return '<div style="padding:10px;border-left:3px solid '+color+';margin:10px 0;">' +
                        '<strong>'+escapeHtml(e.action)+'</strong> by '+escapeHtml(e.actor)+' at '+new Date(e.timestamp).toLocaleString() +
                        (e.detail ? '<p style="margin:5px 0 0 0;color:#666;font-size:13px;">'+escapeHtml(e.detail)+'</p>' : '') +
                        '</div>';
                }).join('');
            } else {
                document.getElementById('eventList').innerHTML = '<p style="color:#666;">{{t "pr_detail.no_events"}}</p>';
            }
        } catch(e) {
            console.error(e);
            D('err:'+e.message);
        }
    }
    async function A(){ if(confirm('Approve?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/approve',{method:'POST'}); L(); } }
    function C(){
        var modal = document.getElementById('closeReasonModal');
        var btnContainer = document.getElementById('closeReasonButtons');
        btnContainer.innerHTML = '';
        closeReasons.forEach(function(reason){
            var btn = document.createElement('button');
            btn.className = 'btn btn-secondary';
            btn.style.margin = '0 4px 4px 0';
            btn.style.padding = '4px 10px';
            btn.textContent = reason;
            btn.onclick = function(){
                document.getElementById('customCloseReason').value = reason;
            };
            btnContainer.appendChild(btn);
        });
        document.getElementById('customCloseReason').value = '';
        modal.style.display = 'flex';
        document.getElementById('confirmCloseBtn').onclick = function(){
            var reason = document.getElementById('customCloseReason').value.trim();
            if(!reason){ reason = 'closed'; }
            modal.style.display = 'none';
            apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/close?reason='+encodeURIComponent(reason),{method:'POST'}).then(function(){ L(); });
        };
    }
    async function R(){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/reopen',{method:'POST'}); L(); }
    async function S(){ if(confirm('Mark spam?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/spam',{method:'POST'}); L(); } }
    async function RV(){ if(confirm('Revert this merged PR?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/revert',{method:'POST'}); L(); } }
    async function RB(){
        if(confirm('Rebase PR #'+prId+' onto its base branch?')){
            var resp = await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/rebase',{method:'POST'});
            if(resp.ok){ L(); }
        }
    }
    async function CMT(){
        var body = prompt('Enter comment for PR #'+prId+':', '');
        if(body === null || body.trim() === '') return;
        await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/comment',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({body: body.trim()})
        });
        L();
    }
    async function CP(){
        var target = prompt('Cherry-pick PR #'+prId+' to target branch:', '');
        if(target === null || target.trim() === '') return;
        var resp = await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/cherry-pick',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({target_branch: target.trim()})
        });
        if(resp.ok){ L(); }
    }
    function D(m){ document.getElementById('prDetail').innerHTML = '<p class="error">'+m+'</p>'; }
    L();
</script>
{{template "client_auth"}}
{{template "pwa_sw"}}
</body>
</html>
