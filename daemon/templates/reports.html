<!DOCTYPE html>
<html lang="{{currentLang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "pwa"}}
    {{template "styles"}}
    <title>{{.title}}</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<h1>{{t "reports.title"}}</h1>

<div id="reportList"></div>
</div>

<script>
function loadReports() {
    fetch('/api/v1/reports?limit=20')
        .then(r => r.json())
        .then(data => renderReports(data))
        .catch(err => console.error('Failed to load reports:', err));
}

function renderReports(reports) {
    const container = document.getElementById('reportList');
    if (!reports || reports.length === 0) {
        container.innerHTML = '<p>No reports generated yet.</p>';
        return;
    }
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>Date</th><th>Period</th><th>Content</th></tr></thead>';
    const tbody = document.createElement('tbody');
    reports.forEach(r => {
        const date = r.timestamp ? new Date(r.timestamp).toLocaleString() : 'N/A';
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>' + escapeHtml(date) + '</td><td>' + escapeHtml(String(r.period_days || '-')) + ' days</td><td><pre style="white-space:pre-wrap;margin:0;"></pre></td>';
        tr.querySelector('pre').textContent = r.content || '';
        tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.innerHTML = '';
    container.appendChild(table);
}

loadReports();
</script>
</body>
</html>
