<!DOCTYPE html>
<html lang="{{currentLang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "pwa"}}
    {{template "styles"}}
    <title>{{.title}}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
{{template "header" .}}
<div class="container">
<h1><span data-i18n="team.title">{{t "team.title"}}</span></h1>

<div style="margin:12px 0;">
    <label><span data-i18n="team.period">{{t "team.period"}}</span> </label>
    <select id="periodSelect" onchange="loadTeamStats()">
        <option value="7">7 <span data-i18n="team.days">{{t "team.days"}}</span></option>
        <option value="30" selected>30 <span data-i18n="team.days">{{t "team.days"}}</span></option>
        <option value="90">90 <span data-i18n="team.days">{{t "team.days"}}</span></option>
    </select>
</div>

<div class="stats" id="summaryCards"></div>

<h2 style="margin-top:24px;"><span data-i18n="team.top_contributors">{{t "team.top_contributors"}}</span></h2>
<div style="max-width:800px;"><canvas id="contributorsChart"></canvas></div>

<h2 style="margin-top:24px;"><span data-i18n="team.all_authors">{{t "team.all_authors"}}</span></h2>
<table id="authorsTable">
    <thead><tr>
        <th><span data-i18n="team.author">{{t "team.author"}}</span></th>
        <th><span data-i18n="team.prs_opened">{{t "team.prs_opened"}}</span></th>
        <th><span data-i18n="team.prs_merged">{{t "team.prs_merged"}}</span></th>
        <th><span data-i18n="team.prs_reviewed">{{t "team.prs_reviewed"}}</span></th>
        <th><span data-i18n="team.avg_lead_time">{{t "team.avg_lead_time"}}</span></th>
    </tr></thead>
    <tbody></tbody>
</table>
</div>

<script>
function loadTeamStats() {
    const period = document.getElementById('periodSelect').value;
    fetch('/api/v1/stats/team?period=' + period)
        .then(r => r.json())
        .then(data => renderTeamStats(data))
        .catch(err => console.error('Failed to load team stats:', err));
}

function renderTeamStats(data) {
    const cards = document.getElementById('summaryCards');
    cards.innerHTML = '';
    const summaryItems = [
        { label: 'Total Authors', value: data.total_authors },
    ];
    summaryItems.forEach(item => {
        cards.innerHTML += '<div class="stat-card"><h3>' + item.label + '</h3><p>' + item.value + '</p></div>';
    });

    const tbody = document.querySelector('#authorsTable tbody');
    tbody.innerHTML = '';
    (data.authors || []).forEach(a => {
        tbody.innerHTML += '<tr><td>' + a.author + '</td><td>' + a.prs_opened + '</td><td>' + a.prs_merged + '</td><td>' + a.prs_reviewed + '</td><td>' + (a.avg_lead_time_hours ? a.avg_lead_time_hours.toFixed(1) + 'h' : '-') + '</td></tr>';
    });

    renderChart(data.top_contributors || []);
}

let chartInstance = null;
function renderChart(topContributors) {
    const ctx = document.getElementById('contributorsChart');
    if (!ctx) return;
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: topContributors.map(a => a.author),
            datasets: [
                { label: 'PRs Merged', data: topContributors.map(a => a.prs_merged), backgroundColor: '#4CAF50' },
                { label: 'PRs Opened', data: topContributors.map(a => a.prs_opened), backgroundColor: '#2196F3' },
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
}

loadTeamStats();
</script>
</body>
</html>
